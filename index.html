<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dron Store</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#111;
    border-bottom:2px solid red;
}

nav h1{
    color:purple;
}

nav a{
    color:pony pink;
    text-decoration:none;
    margin-left:20px;
}

nav a:hover{
    color:red;
}

/* HERO */

.hero{
    height:90vh;
    background:url("https://images.unsplash.com/photo-1508610048659-a06b669e3321") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
}

.hero h2{
    font-size:50px;
}

.hero button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

.hero button:hover{
    background:darkred;
}

/* PRODUCTS */

.products{
    padding:60px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    margin-top:40px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card button{
    margin-top:10px;
    padding:10px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
}

/* FOOTER */

footer{
    background:#111;
    padding:20px;
    text-align:center;
    border-top:2px solid red;
}

</style>
</head>

<body>

<nav>
<h1>Dron Store</h1>

<div>
<a href="#">Home</a>
<a href="#">Drones</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">
<h2>The Future Of Drones</h2>
<p>Buy the best drones with high quality</p>
<button>Shop Now</button>
</section>

<section class="products">

<h2>Our Drones</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1473968512647-3e447244af8f">
<h3>Drone X1</h3>
<p>$100</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1508610048659-a06b669e3321">
<h3>Drone Pro</h3>
<p>$499</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506947411487-a56738267384">
<h3>Drone Ultra</h3>
<p>$799</p>
<button>Buy</button>
</div>

</div>

</section>

<footer>
<p>© 2026 Dron Store</p>
</footer>

</body>

</html>
